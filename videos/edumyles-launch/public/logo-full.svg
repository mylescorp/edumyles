<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="EduMyles - Empowering Education">
  <defs>
    <linearGradient id="lf-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7DF82"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9B7A0A"/>
    </linearGradient>
    <linearGradient id="lf-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E35"/>
      <stop offset="100%" stop-color="#0A3020"/>
    </linearGradient>
  </defs>
  <!-- Shield icon (scaled to ~160x180, centered at x=200) -->
  <!-- Outer shield gold -->
  <path d="M200,8 C178,8 148,14 148,14 L148,108 C148,136 170,152 200,162 C230,152 252,136 252,108 L252,14 C252,14 222,8 200,8 Z" fill="url(#lf-gold)"/>
  <!-- Inner shield green -->
  <path d="M200,15 C181,15 155,20 155,20 L155,107 C155,133 174,148 200,157 C226,148 245,133 245,107 L245,20 C245,20 219,15 200,15 Z" fill="url(#lf-green)"/>
  <!-- Inner ring -->
  <path d="M200,19 C183,19 159,24 159,24 L159,106 C159,131 177,145 200,154 C223,145 241,131 241,106 L241,24 C241,24 217,19 200,19 Z" fill="none" stroke="#D4AF37" stroke-width="1.2" opacity="0.5"/>
  <!-- Sparkle -->
  <line x1="200" y1="3" x2="200" y2="11" stroke="#F7DF82" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="195" y1="7" x2="205" y2="7" stroke="#F7DF82" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="196.5" y1="3.5" x2="203.5" y2="10.5" stroke="#F7DF82" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="203.5" y1="3.5" x2="196.5" y2="10.5" stroke="#F7DF82" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Letter E -->
  <rect x="184" y="30" width="8" height="46" fill="url(#lf-gold)" rx="0.5"/>
  <rect x="184" y="30" width="32" height="8" fill="url(#lf-gold)" rx="0.5"/>
  <rect x="184" y="51" width="27" height="7" fill="url(#lf-gold)" rx="0.5"/>
  <rect x="184" y="68" width="32" height="8" fill="url(#lf-gold)" rx="0.5"/>
  <!-- Open Book -->
  <path d="M160,110 C160,103 177,99 200,101 L200,115 C177,113 160,119 160,110 Z" fill="url(#lf-gold)"/>
  <path d="M240,110 C240,103 223,99 200,101 L200,115 C223,113 240,119 240,110 Z" fill="url(#lf-gold)"/>
  <rect x="199" y="99" width="2" height="18" fill="#9B7A0A" opacity="0.7" rx="0.5"/>
  <!-- EduMyles text -->
  <text x="200" y="195" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="38" font-weight="700" fill="#D4AF37" letter-spacing="0.5">EduMyles</text>
  <!-- Tagline -->
  <text x="200" y="220" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="13" font-weight="500" fill="#D4AF37" letter-spacing="3" opacity="0.85">EMPOWERING EDUCATION</text>
</svg>
