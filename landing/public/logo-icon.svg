<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="EduMyles">
  <defs>
    <linearGradient id="lg-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7DF82"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9B7A0A"/>
    </linearGradient>
    <linearGradient id="lg-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E35"/>
      <stop offset="100%" stop-color="#0A3020"/>
    </linearGradient>
    <filter id="lg-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer shield gold -->
  <path d="M100,8 C68,8 18,18 18,18 L18,118 C18,162 55,192 100,208 C145,192 182,162 182,118 L182,18 C182,18 132,8 100,8 Z" fill="url(#lg-gold)"/>
  <!-- Inner shield green -->
  <path d="M100,18 C72,18 28,27 28,27 L28,117 C28,157 62,184 100,198 C138,184 172,157 172,117 L172,27 C172,27 128,18 100,18 Z" fill="url(#lg-green)"/>
  <!-- Inner thin gold ring -->
  <path d="M100,23 C75,23 33,31 33,31 L33,116 C33,153 65,179 100,192 C135,179 167,153 167,116 L167,31 C167,31 125,23 100,23 Z" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.55"/>
  <!-- Sparkle at top -->
  <g filter="url(#lg-glow)">
    <line x1="100" y1="1" x2="100" y2="14" stroke="#F7DF82" stroke-width="2" stroke-linecap="round"/>
    <line x1="93" y1="7.5" x2="107" y2="7.5" stroke="#F7DF82" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="95.5" y1="2.5" x2="104.5" y2="12.5" stroke="#F7DF82" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    <line x1="104.5" y1="2.5" x2="95.5" y2="12.5" stroke="#F7DF82" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Letter E (geometric, serif-like) -->
  <!-- Vertical stroke -->
  <rect x="72" y="48" width="12" height="68" fill="url(#lg-gold)" rx="1"/>
  <!-- Top horizontal -->
  <rect x="72" y="48" width="48" height="11" fill="url(#lg-gold)" rx="1"/>
  <!-- Middle horizontal (slightly shorter) -->
  <rect x="72" y="78" width="40" height="10" fill="url(#lg-gold)" rx="1"/>
  <!-- Bottom horizontal -->
  <rect x="72" y="105" width="48" height="11" fill="url(#lg-gold)" rx="1"/>
  <!-- Open Book -->
  <!-- Left page -->
  <path d="M36,155 C36,143 65,137 100,139 L100,160 C65,158 36,168 36,155 Z" fill="url(#lg-gold)"/>
  <!-- Right page -->
  <path d="M164,155 C164,143 135,137 100,139 L100,160 C135,158 164,168 164,155 Z" fill="url(#lg-gold)"/>
  <!-- Book spine -->
  <rect x="98.5" y="137" width="3" height="25" fill="#9B7A0A" opacity="0.7" rx="1"/>
  <!-- Book base line -->
  <path d="M36,155 Q100,163 164,155" stroke="#9B7A0A" stroke-width="1.2" fill="none" opacity="0.6"/>
</svg>
